# Renderide renderer configuration (INI).
# This file is written by the renderer when you use the in-app "Renderer config" window.
# Do not edit this file manually while the renderer is running — changes may be overwritten or lost.
# Path resolution: see crate::config module docs (RENDERIDE_CONFIG, exe dir, cwd, ...).
#
[debug]
log_verbose = false
power_preference = high_performance

[display]
focused_fps = 240
unfocused_fps = 60

[rendering]
exposure = 0.860000
vsync = false
