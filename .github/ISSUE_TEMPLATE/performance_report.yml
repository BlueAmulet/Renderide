name: Performance report
description: Report frame pacing, CPU/GPU cost, memory, stutter, or regression issues.
title: "[Performance]: "
labels: ["performance"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for stutter, regressions, memory growth, GPU bottlenecks, CPU bottlenecks, and frame pacing issues. Attach or paste the relevant renderer log; it already includes version, target, config, graphics API, GPU selection, validation state, and startup diagnostics.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the performance problem in one or two sentences.
      placeholder: "Example: VR frame time spikes from 6 ms to 22 ms when many transparent UI panels are visible."
    validations:
      required: true
  - type: textarea
    id: workload
    attributes:
      label: Workload
      description: Describe the world, scene, view, or action that causes the problem.
      placeholder: Include relevant content such as visible meshes, UI, lights, mirrors, videos, avatars, users, or repeated actions.
    validations:
      required: true
  - type: textarea
    id: measurements
    attributes:
      label: Measurements
      description: Provide the numbers you have. Approximate values are useful if exact captures are unavailable.
      placeholder: |
        Renderide result:
        Baseline or Unity result:
        Capture tool or HUD used:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Attach the renderer log, or paste timing, resource churn, warning, validation, or startup sections. Include host/bootstrapper logs too if they help. If logs are unavailable, explain why.
      render: text
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Optional. Add steps if the workload description is not enough to reproduce the performance problem.
      placeholder: |
        1. Launch ...
        2. Load ...
        3. Look at or interact with ...
        4. Observe frame time ...
    validations:
      required: false
  - type: textarea
    id: profiling
    attributes:
      label: Profiling captures
      description: Optional. Attach Tracy captures, GPU captures, HUD screenshots, or pass timing logs.
    validations:
      required: false
  - type: textarea
    id: baseline
    attributes:
      label: Baseline or last known good version
      description: Optional. If this is a regression, provide the last commit, build, or release that performed well.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add anything not already visible in the logs or measurements.
    validations:
      required: false
