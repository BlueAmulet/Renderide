name: Bug report
description: Report incorrect rendering, input, windowing, or runtime behavior.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for behavior that is wrong but does not crash the renderer. Attach or paste the relevant renderer log; it already includes version, target, config, graphics API, GPU selection, validation state, and startup diagnostics.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug in one or two sentences.
      placeholder: "Example: Transparent UI panels render in front of opaque world geometry when viewed in VR."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest reliable path to the problem. Include world/content names only if they are needed to reproduce it.
      placeholder: |
        1. Launch Renderide.
        2. Open ...
        3. Look at or interact with ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual behavior
      description: Explain what should happen and what Renderide does instead.
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Attach the renderer log, or paste the relevant section. Include host/bootstrapper logs too if they help. If logs are unavailable, explain why.
      render: text
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots or video
      description: Optional, but strongly recommended for visual issues. Label Unity and Renderide captures when comparing.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any context not already visible in the logs, such as suspected material names, shader names, or unusual scene setup.
    validations:
      required: false
