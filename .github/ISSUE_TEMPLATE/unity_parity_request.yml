name: Unity parity request
description: Report missing or mismatched behavior compared with the Unity renderer.
title: "[Parity]: "
labels: ["parity"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when the Unity renderer has behavior that Renderide should match. Attach or paste the relevant renderer log; it already includes version, target, config, graphics API, GPU selection, validation state, and startup diagnostics.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the parity gap in one or two sentences.
      placeholder: "Example: Xiexe Toon rim lighting is much brighter in Unity than in Renderide."
    validations:
      required: true
  - type: textarea
    id: comparison
    attributes:
      label: Unity vs Renderide comparison
      description: Describe what Unity does, what Renderide does, and why the difference matters.
      placeholder: |
        Unity:
        Renderide:
        Impact:
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots or video
      description: Optional, but strongly recommended. Label which capture is Unity and which is Renderide.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add material names, shader names, world/content names, or other context not already visible in the logs.
    validations:
      required: false
