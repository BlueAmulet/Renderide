name: Crash report
description: Report crashes, panics, hangs, GPU device loss, or startup failures.
title: "[Crash]: "
labels: ["crash"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when Renderide exits unexpectedly, stops presenting frames, loses the GPU device, panics, or fails during startup. Attach or paste the relevant renderer log; it already includes version, target, config, graphics API, GPU selection, validation state, and startup diagnostics.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the failure in one or two sentences.
      placeholder: "Example: Renderide panics when entering VR after loading a world with video textures."
    validations:
      required: true
  - type: textarea
    id: leadup
    attributes:
      label: What happened before the failure?
      description: Describe the actions or scene state immediately before the crash, hang, device loss, or startup failure.
      placeholder: |
        1. Launch ...
        2. Load or enter ...
        3. Wait for or interact with ...
        4. Renderer crashes, hangs, or stops presenting.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Crash logs
      description: Attach the renderer log, or paste the first panic, error, validation message, backtrace, or device-loss section. Include host/bootstrapper logs too if they help. If logs are unavailable, explain why.
      render: text
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: Optional triage hint.
      options:
        - Every time
        - Often
        - Sometimes
        - Once
        - Unknown
    validations:
      required: false
  - type: textarea
    id: last_good
    attributes:
      label: Last known good version
      description: Optional. If this is a regression, provide the last commit, build, or release that worked.
    validations:
      required: false
  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: Optional. Add screenshots, videos, GPU captures, crash dumps, or other diagnostic files.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add anything not already visible in the logs.
    validations:
      required: false
