name: Feature request
description: Request a new capability, workflow, platform improvement, or renderer tool.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new functionality that is not primarily about matching existing Unity renderer behavior. For Unity behavior gaps, use the parity request form.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this solve, and who benefits from it?
      placeholder: "Example: It is hard to diagnose GPU timing spikes without pass-level timing in the diagnostics HUD."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the capability, workflow, or user-visible behavior you want.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Optional. Explain whether this blocks common use, improves parity, improves performance, improves diagnostics, or is a quality-of-life improvement.
    validations:
      required: false
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Optional. Mention platform, VR, host protocol, shader, performance, or testing constraints if known.
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: References
      description: Optional. Link related issues, screenshots, captures, papers, standards, or renderer examples.
    validations:
      required: false
